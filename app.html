<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM4</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="app-container">

        <!-- Sidebar for Settings & Small Transcript -->
        <aside class="sidebar glass-panel">
            <div class="brand-section">
                <div class="brand-header">
                    <img src="logo.png" alt="LLM4 Logo" class="app-logo" onerror="this.style.display='none'">
                    <h1>LLM4</h1>
                </div>
                <div class="social-links">
                    <a href="#" target="_blank" title="X (Twitter)"><i class="fa-brands fa-x-twitter"></i></a>
                    <a href="#" target="_blank" title="Pump.fun"><i class="fa-solid fa-pills"></i></a>
                    <a href="index.html" title="Website"><i class="fa-solid fa-globe"></i></a>
                </div>
                <div class="ca-container" id="ca-container">
                    <span class="ca-label">CA:</span>
                    <span class="ca-address" id="ca-text">TBD...</span>
                </div>
            </div>

            <div class="sidebar-header">
                <h2 style="display: flex; align-items: center; gap: 0.5rem; width: 100%;">
                    <a href="index.html" class="back-arrow mobile-only" style="display: none; margin-right: 10px;"><i
                            class="fa-solid fa-house"></i></a>
                    <i class="fa-solid fa-layer-group"></i> Transcript
                </h2>
                <div class="sidebar-actions">
                    <button id="close-transcript-btn" class="icon-btn mobile-only" style="display: none;"
                        title="Close Transcript">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                    <button id="settings-btn" class="icon-btn" title="Settings">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                </div>
            </div>

            <div class="transcript-container" id="transcript-container">
                <div class="transcript-msg system">
                    <em>Welcome to LLM4! Enter a prompt below to begin the discussion.</em>
                </div>
            </div>

            <div class="sidebar-footer" style="padding: 0; border: none; min-height: 10px;">
                <!-- Empty or removed footer to save space -->
            </div>
        </aside>

        <!-- Main Roundtable Area -->
        <main class="roundtable-area">

            <div class="roundtable-wrapper">
                <!-- The actual "Table" graphic -->
                <div class="table-center">
                    <img src="logo.png" class="table-logo" alt="Logo Watermark" onerror="this.style.display='none'">
                    <div class="core-glow"></div>
                </div>

                <!-- AI Seats around the table -->
                <!-- Top: ChatGPT -->
                <div class="ai-seat pos-top" id="seat-chatgpt">
                    <div class="avatar chatgpt">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path fill="currentColor"
                                d="M22.2819 9.8211a5.9847 5.9847 0 0 0-.5157-4.9108 6.0462 6.0462 0 0 0-6.5098-2.9A6.0651 6.0651 0 0 0 4.9807 4.1818a5.9847 5.9847 0 0 0-3.9977 2.9 6.0462 6.0462 0 0 0 .7427 7.0966 5.98 5.98 0 0 0 .511 4.9107 6.051 6.051 0 0 0 6.5146 2.9001A5.9847 5.9847 0 0 0 13.2599 24a6.0557 6.0557 0 0 0 5.7718-4.2058 5.9894 5.9894 0 0 0 3.9977-2.9001 6.0557 6.0557 0 0 0-.7475-7.073zm-9.022 12.6081a4.4755 4.4755 0 0 1-2.8764-1.0408l.1419-.0804 4.7783-2.7582a.7948.7948 0 0 0 .3927-.6813v-6.7369l2.02 1.1686a.071.071 0 0 1 .038.052v5.5826a4.504 4.504 0 0 1-4.4945 4.4944zm-9.6607-4.1254a4.4708 4.4708 0 0 1-.5346-3.0137l.142.0852 4.783 2.7582a.7712.7712 0 0 0 .7806 0l5.8428-3.3685v2.3324a.0804.0804 0 0 1-.0332.0615L9.74 19.9502a4.4992 4.4992 0 0 1-6.1408-1.6464zM2.3408 7.8956a4.485 4.485 0 0 1 2.3655-1.9728V11.6a.7664.7664 0 0 0 .3879.6765l5.8144 3.3543-2.0201 1.1685a.0757.0757 0 0 1-.071 0l-4.8303-2.7865A4.504 4.504 0 0 1 2.3408 7.8956zm16.0993 3.8558L12.5962 8.3829a.0804.0804 0 0 1 .0332-.0615l4.8303-2.7866a4.4992 4.4992 0 0 1 6.6802 4.66v5.6773a.7664.7664 0 0 1-.3879.6765l-5.3117 3.0645zM15.531 6.551a4.4755 4.4755 0 0 1 2.8906 1.0503l-.1419.0804-4.7783 2.7582a.7948.7948 0 0 0-.3927.6813V17.858l-2.02-1.1686a.071.071 0 0 1-.038-.052V11.055a4.504 4.504 0 0 1 4.4804-4.5039zm-6.2255 1.579L15.148 4.7615a.0804.0804 0 0 1 .071 0l4.8303 2.7913a4.4944 4.4944 0 0 1-.6762 8.1042v-5.6772a.79.79 0 0 0-.3927-.6813L13.138 5.929z" />
                        </svg>
                    </div>
                    <div class="ai-badge">ChatGPT <small>GPT-4o</small></div>
                    <div class="status-indicator"></div>
                    <div class="speech-bubble bubble-top" id="bubble-chatgpt">
                        <div class="bubble-content"></div>
                    </div>
                </div>

                <!-- Right: Claude -->
                <div class="ai-seat pos-right" id="seat-claude">
                    <div class="avatar claude">
                        <svg viewBox="0 0 54 54" width="24" height="24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M40.2307 23.3846L39.7307 23.2307C39.4615 23.1153 39.1923 23.2692 39.1153 23.5384L36.8846 32.2692C36.8077 32.5384 36.9615 32.8077 37.2307 32.8846L37.7307 33.0384C38.0384 33.1153 38.3077 32.9615 38.3846 32.6538L40.6153 23.923C40.6923 23.6538 40.5384 23.4615 40.2307 23.3846ZM35.0769 19.3461L34.1153 18.7307C33.8846 18.5769 33.5769 18.6538 33.423 18.9615L25.9615 32.3846C25.8077 32.6153 25.8846 32.923 26.1153 33.0769L27.0769 33.6923C27.3077 33.8461 27.6153 33.7692 27.7692 33.4615L35.2307 20.0384C35.3846 19.8077 35.3077 19.5 35.0769 19.3461ZM28.5769 15.6538L27.423 14.8077C27.1923 14.6538 26.8846 14.6538 26.7307 14.8846L16.2307 33.3461C16.0769 33.5769 16.0769 33.8846 16.3077 34.0384L17.4615 34.8846C17.6923 35.0384 18 35.0384 18.1538 34.8077L28.6538 16.3461C28.8077 16.1153 28.8077 15.8077 28.5769 15.6538ZM40.0769 35.9615L35.923 41.5384H31.7692L35.923 35.9615H40.0769Z"
                                fill="currentColor" />
                            <path fill-rule="evenodd" clip-rule="evenodd"
                                d="M12 27C12 18.7157 18.7157 12 27 12C35.2843 12 42 18.7157 42 27C42 35.2843 35.2843 42 27 42C18.7157 42 12 35.2843 12 27ZM27 7.03846C15.9615 7.03846 7.03846 15.9615 7.03846 27C7.03846 38.0384 15.9615 46.9615 27 46.9615C38.0384 46.9615 46.9615 38.0384 46.9615 27C46.9615 15.9615 38.0384 7.03846 27 7.03846Z"
                                fill="currentColor" />
                        </svg>
                    </div>
                    <div class="ai-badge">Claude <small>Sonnet 3.5</small></div>
                    <div class="status-indicator"></div>
                    <div class="speech-bubble bubble-right" id="bubble-claude">
                        <div class="bubble-content"></div>
                    </div>
                </div>

                <!-- Bottom: Gemini -->
                <div class="ai-seat pos-bottom" id="seat-gemini">
                    <div class="avatar gemini">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path fill="currentColor"
                                d="M11.967 3.061c.14-.389.684-.389.824 0 1.085 3.012 3.42 5.347 6.432 6.432.389.14.389.684 0 .824-3.012 1.085-5.347 3.42-6.432 6.432-.14.389-.684.389-.824 0-1.085-3.012-3.42-5.347-6.432-6.432-.389-.14-.389-.684 0-.824 3.012-1.085 5.347-3.42 6.432-6.432z" />
                        </svg>
                    </div>
                    <div class="ai-badge">Gemini <small>1.5 Pro</small></div>
                    <div class="status-indicator"></div>
                    <div class="speech-bubble bubble-bottom" id="bubble-gemini">
                        <div class="bubble-content"></div>
                    </div>
                </div>

                <!-- Left: Grok -->
                <div class="ai-seat pos-left" id="seat-grok">
                    <div class="avatar grok">
                        <svg viewBox="0 0 24 24" width="22" height="22">
                            <path fill="currentColor"
                                d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
                        </svg>
                    </div>
                    <div class="ai-badge">Grok <small>Beta</small></div>
                    <div class="status-indicator"></div>
                    <div class="speech-bubble bubble-left" id="bubble-grok">
                        <div class="bubble-content"></div>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area glass-panel">
                <div class="input-controls-top">
                    <div class="control-group">
                        <button id="random-topic-btn" class="secondary-btn">
                            <i class="fa-solid fa-dice"></i> Random Topic
                        </button>
                        <button id="clear-chat-btn" class="secondary-btn text-gray-400 hover:text-white">
                            <i class="fa-solid fa-trash-can"></i> Clear Table
                        </button>
                        <button id="stop-btn" class="secondary-btn"
                            style="color: #ef4444; border-color: rgba(239, 68, 68, 0.3); display: none;">
                            <i class="fa-solid fa-stop"></i> Stop
                        </button>
                        <button id="mobile-transcript-btn" class="secondary-btn mobile-only" style="display: none;">
                            <i class="fa-solid fa-layer-group"></i> Transcript
                        </button>
                    </div>
                    <label class="toggle-switch" title="AIs will continue talking automatically">
                        <input type="checkbox" id="autopilot-toggle">
                        <span class="slider round"></span>
                        <span class="toggle-label">Auto-Pilot</span>
                    </label>
                </div>
                <div class="input-wrapper">
                    <textarea id="message-input" placeholder="Address the roundtable..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn" disabled>
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h2>Settings</h2>
                <button id="close-modal-btn" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label for="api-key-input">OpenRouter API Key (Optional)</label>
                    <input type="password" id="api-key-input" placeholder="sk-or-v1-...">
                    <small class="help-text">Leave blank to use mock responses.</small>
                </div>
                <div class="form-group" style="display:flex; flex-direction:column; gap:4px;">
                    <label for="web-search-toggle" style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                        <input type="checkbox" id="web-search-toggle" style="width: auto; cursor:pointer;">
                        <span style="color:var(--text-primary); font-size: 0.9rem;">Enable Real-Time Web Search</span>
                    </label>
                    <small class="help-text">Allows the AIs to pull breaking news from the live internet.</small>
                </div>
            </div>
            <div class="modal-footer">
                <button id="save-settings-btn" class="primary-btn">Save Settings</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js?v=7"></script>
</body>

</html>
